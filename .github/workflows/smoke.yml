name: smoke

on:
  push:
  pull_request:

jobs:
  py_compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Compile Python files
        run: python -m py_compile Core_code/*.py demo.py
